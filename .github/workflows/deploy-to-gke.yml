name: Build and Deploy to GKE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: gcr.io
  GKE_CLUSTER: kaiops-gke
  GKE_ZONE: us-central1-a
  GKE_REGION: us-central1
  DEPLOYMENT_NAME: kaiops
  NAMESPACE: kaiops

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build-backend.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate image metadata
        id: meta
        run: |
          echo "tags=${{ github.sha }}-$(date +%s)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker gcr.io

      - name: Build backend image
        run: |
          docker build \
            -f kubernetes/Dockerfile.backend \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/kaiops-backend:latest \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/kaiops-backend:${{ github.sha }} \
            .

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/kaiops-backend:latest
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/kaiops-backend:${{ github.sha }}

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker gcr.io

      - name: Build frontend image
        run: |
          docker build \
            -f kubernetes/Dockerfile.frontend \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/kaiops-frontend:latest \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/kaiops-frontend:${{ github.sha }} \
            .

      - name: Push frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/kaiops-frontend:latest
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/kaiops-frontend:${{ github.sha }}

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --zone ${{ env.GKE_ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Create namespaces if not exist
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace redis --dry-run=client -o yaml | kubectl apply -f -

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry gcr-json-key \
            --docker-server=gcr.io \
            --docker-username=_json_key \
            --docker-password="$(cat $GOOGLE_APPLICATION_CREDENTIALS)" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update Kubernetes manifests
        run: |
          sed -i 's|gcr.io/YOUR_PROJECT_ID|${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}|g' \
            kubernetes/kaiops-deployment.yaml
          sed -i 's|kaiops-backend:latest|kaiops-backend:${{ github.sha }}|g' \
            kubernetes/kaiops-deployment.yaml
          sed -i 's|kaiops-frontend:latest|kaiops-frontend:${{ github.sha }}|g' \
            kubernetes/kaiops-deployment.yaml

      - name: Deploy to GKE
        run: |
          kubectl apply -f kubernetes/redis-statefulset.yaml
          kubectl apply -f kubernetes/kaiops-deployment.yaml -n ${{ env.NAMESPACE }}

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/kaiops-backend \
            -n ${{ env.NAMESPACE }} \
            --timeout=5m
          kubectl rollout status deployment/kaiops-frontend \
            -n ${{ env.NAMESPACE }} \
            --timeout=5m

      - name: Check deployment status
        if: always()
        run: |
          echo "=== Pods Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          echo ""
          echo "=== Services Status ==="
          kubectl get svc -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by='.lastTimestamp' | tail -10

      - name: Run health checks
        run: |
          echo "Waiting for services to be ready..."
          sleep 30
          
          # Get service IP
          SERVICE_IP=$(kubectl get service kaiops-backend -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          
          if [ "$SERVICE_IP" != "pending" ]; then
            echo "Testing backend health at $SERVICE_IP:8000/health"
            for i in {1..30}; do
              if curl -f http://$SERVICE_IP:8000/health > /dev/null 2>&1; then
                echo "✅ Backend is healthy"
                break
              fi
              echo "Attempt $i: Waiting for backend to be ready..."
              sleep 5
            done
          else
            echo "⚠️  Service IP still pending, skipping health check"
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sre-agent-backend/requirements.txt

      - name: Run backend tests
        run: |
          cd sre-agent-backend
          python -m pytest tests/ -v --cov=app --cov-report=xml
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./sre-agent-backend/coverage.xml
        continue-on-error: true

  notify:
    name: Notify on Deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to GKE completed successfully!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
