# GCP Cloud Build Configuration for KaiOPS - Simplified
# This pipeline only builds Docker images and pushes to GCR

steps:
  # Step 1: Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/kaiops-backend:latest'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/kaiops-backend:${COMMIT_SHA}'
      - '-f'
      - 'kubernetes/Dockerfile.backend'
      - '.'
    waitFor: ['-']

  # Step 2: Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/kaiops-backend:latest'
    waitFor: ['build-backend']

  # Step 3: Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/kaiops-frontend:latest'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/kaiops-frontend:${COMMIT_SHA}'
      - '--build-arg'
      - 'VITE_API_URL=http://api.kaiops-sre.searceinc.net/api/v1'
      - '-f'
      - 'kubernetes/Dockerfile.frontend'
      - '.'
    waitFor: ['-']

  # Step 4: Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/kaiops-frontend:latest'
    waitFor: ['build-frontend']

# Images to be pushed to the registry
images:
  - 'gcr.io/${PROJECT_ID}/kaiops-backend:latest'
  - 'gcr.io/${PROJECT_ID}/kaiops-frontend:latest'

# Build configuration
options:
  machineType: 'E2_MEDIUM'
  logging: CLOUD_LOGGING_ONLY

# Timeout - increased for slower machine
timeout: '3600s'
