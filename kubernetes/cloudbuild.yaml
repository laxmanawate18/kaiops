# GCP Cloud Build Configuration for KaiOPS
# This pipeline builds Docker images and deploys to GKE

steps:
  # Step 1: Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/kaiops-backend:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/kaiops-backend:latest'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/kaiops-backend:v2.0.0'
      - '-f'
      - 'kubernetes/Dockerfile.backend'
      - '.'
    waitFor: ['-']

  # Step 2: Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/kaiops-backend'
    waitFor: ['build-backend']

  # Step 3: Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/kaiops-frontend:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/kaiops-frontend:latest'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/kaiops-frontend:v2.0.0'
      - '-f'
      - 'kubernetes/Dockerfile.frontend'
      - '.'
    waitFor: ['-']

  # Step 4: Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/kaiops-frontend'
    waitFor: ['build-frontend']

  # Step 5: Update deployment manifest with new image
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'update-manifest'
    args:
      - 'set'
      - 'image'
      - 'deployment/kaiops-backend'
      - 'backend=gcr.io/${PROJECT_ID}/kaiops-backend:latest'
      - 'deployment/kaiops-frontend'
      - 'frontend=gcr.io/${PROJECT_ID}/kaiops-frontend:latest'
      - '-n'
      - 'kaiops'
      - '--record'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=kai-ops'
    waitFor: ['push-backend', 'push-frontend']

  # Step 6: Deploy to GKE
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'deploy-gke'
    args:
      - 'apply'
      - '-f'
      - 'kubernetes/kaiops-deployment.yaml'
      - '-n'
      - 'kaiops'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=kai-ops'
    waitFor: ['push-frontend']

  # Step 7: Verify deployment
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'verify-deployment'
    args:
      - 'rollout'
      - 'status'
      - 'deployment/kaiops-backend'
      - '-n'
      - 'kaiops'
      - '--timeout=5m'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=kai-ops'
    waitFor: ['deploy-gke']

# Images to be pushed to the registry
images:
  - 'gcr.io/$PROJECT_ID/kaiops-backend:latest'
  - 'gcr.io/$PROJECT_ID/kaiops-frontend:latest'

# Build configuration
options:
  machineType: 'E2_MEDIUM'
  logging: CLOUD_LOGGING_ONLY

# Timeout
timeout: '1800s'

# Approval required for production
# onFailure: 'PUSH'
